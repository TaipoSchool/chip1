        // --- SOUND EFFECTS (WEB AUDIO API) ---
        const playSynthSound = (type) => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                
                if (type === 'success') {
                    const osc1 = ctx.createOscillator();
                    const osc2 = ctx.createOscillator();
                    const gainNode = ctx.createGain();
                    osc1.connect(gainNode);
                    osc2.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    osc1.type = 'sine';
                    osc2.type = 'sine';
                    osc1.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
                    osc1.frequency.setValueAtTime(659.25, ctx.currentTime + 0.12); // E5
                    osc2.frequency.setValueAtTime(1046.50, ctx.currentTime);
                    osc2.frequency.setValueAtTime(1318.50, ctx.currentTime + 0.12);
                    gainNode.gain.setValueAtTime(0.06, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
                    osc1.start();
                    osc2.start();
                    osc1.stop(ctx.currentTime + 0.4);
                    osc2.stop(ctx.currentTime + 0.4);
                } else if (type === 'error') {
                    const osc = ctx.createOscillator();
                    const gainNode = ctx.createGain();
                    osc.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(220, ctx.currentTime);
                    osc.frequency.setValueAtTime(150, ctx.currentTime + 0.15);
                    gainNode.gain.setValueAtTime(0.06, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'click') {
                    const osc = ctx.createOscillator();
                    const gainNode = ctx.createGain();
                    osc.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(450, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(850, ctx.currentTime + 0.08);
                    gainNode.gain.setValueAtTime(0.04, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.08);
                }
            } catch (e) {
                console.log("Audio not supported.");
            }
        };

        // --- CANTONESE SPEECH SYNTHESIS ENGINE ---
        const speakCantonese = (text) => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Stop anything currently playing
                const utterance = new SpeechSynthesisUtterance(text);
                
                // Fetch and assign Cantonese voice specifically
                const voices = window.speechSynthesis.getVoices();
                const cantoneseVoice = voices.find(v => 
                    v.lang.toLowerCase().includes('hk') || 
                    v.lang.toLowerCase().includes('zh-hk') || 
                    v.lang.toLowerCase().includes('yue')
                );
                
                if (cantoneseVoice) {
                    utterance.voice = cantoneseVoice;
                } else {
                    utterance.lang = 'zh-HK';
                }
                
                utterance.rate = 0.82; // Kid friendly speed
                utterance.pitch = 1.1; // Cute high pitch
                window.speechSynthesis.speak(utterance);
            } else {
                alert("抱歉，您的裝置不支援廣東話發聲功能。建議使用 Chrome 或 Safari 瀏覽器！");
            }
        };

                        <rect x="85" y="170" width="30" height="20" fill="#3B82F6" rx="3" />
                        <circle cx="95" cy="180" r="4" fill="#10B981" />
                    </g>
                );
            } else if (costume === 'explorer') {
                costumeHat = (
                    <g>
                        <ellipse cx="100" cy="58" rx="55" ry="10" fill="#B45309" stroke="#4A3B32" strokeWidth="4" />
                        <path d="M65,55 C65,30 135,30 135,55 Z" fill="#D97706" stroke="#4A3B32" strokeWidth="4" />
                        <rect x="70" y="48" width="60" height="7" fill="#4A3B32" />
                    </g>
                );
                costumeShirt = <path d="M55,160 L145,160 L135,200 L65,200 Z" fill="#065F46" stroke="#4A3B32" strokeWidth="4" />;
                shirtDetail = (
                    <g>
                        <line x1="100" y1="165" x2="100" y2="195" stroke="#FBBF24" strokeWidth="3" />
                        <rect x="75" y="170" width="12" height="15" fill="#047857" stroke="#4A3B32" strokeWidth="2" />
                        <rect x="113" y="170" width="12" height="15" fill="#047857" stroke="#4A3B32" strokeWidth="2" />
                    </g>
                );
            } else if (costume === 'wizard') {
                costumeHat = (
                    <g>
                        <ellipse cx="100" cy="58" rx="60" ry="10" fill="#4338CA" stroke="#4A3B32" strokeWidth="4" />
                        <path d="M60,54 L100,5 L140,54 Z" fill="#6366F1" stroke="#4A3B32" strokeWidth="4" strokeLinejoin="round" />
                        <polygon points="100,20 102,25 108,25 103,29 105,35 100,31 95,35 97,29 92,25 98,25" fill="#FBBF24" />
                    </g>
                );
                costumeShirt = <path d="M55,160 L145,160 L135,200 L65,200 Z" fill="#4338CA" stroke="#4A3B32" strokeWidth="4" />;
                shirtDetail = (
                    <g>
                        <polygon points="100,168 103,174 110,174 105,178 107,184 100,180 93,184 95,178 90,174 97,174" fill="#FBBF24" />
                    </g>
                );
            }

            return (
                <svg viewBox="0 0 200 210" className="w-full h-full drop-shadow-md">
                    <circle cx="100" cy="110" r="85" fill="#F3F4F6" opacity="0.3" />
                    {costumeShirt}
                    {shirtDetail}
                    <rect x="90" y="130" width="20" height="20" fill="#FFE3D1" stroke="#4A3B32" strokeWidth="4" />
                    <circle cx="100" cy="95" r="43" fill="#FFE3D1" stroke="#4A3B32" strokeWidth="4" />
                    <circle cx="55" cy="95" r="9" fill="#FFE3D1" stroke="#4A3B32" strokeWidth="4" />
                    <circle cx="145" cy="95" r="9" fill="#FFE3D1" stroke="#4A3B32" strokeWidth="4" />
                    <path d="M54,80 C54,50 146,50 146,80 C146,80 135,58 100,58 C65,58 54,80 54,80 Z" fill="#5C4033" stroke="#4A3B32" strokeWidth="4" />
                    <path d="M57,80 L75,80 L80,72 L95,84 L108,70 L120,84 L130,75 L143,80" stroke="#4A3B32" strokeWidth="4" fill="none" strokeLinecap="round" />
                    {eyebrows}
                    {eyeLeft}
                    {eyeRight}
                    {blush}
                    {mouth}
                    {sweatDrop}
                    {costumeHat}
                </svg>
            );
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [completedDays, setCompletedDays] = useState(() => {
                const saved = localStorage.getItem('loklok_completed_days_v2');
                return saved ? JSON.parse(saved) : {};
            });
            const [stars, setStars] = useState(() => {
                const saved = localStorage.getItem('loklok_stars_v2');
                return saved ? parseInt(saved, 10) : 0;
            });
            const [currentCostume, setCurrentCostume] = useState(() => {
                const saved = localStorage.getItem('loklok_costume_v2');
                return saved ? saved : 'plain';
            });
            const [parentMode, setParentMode] = useState(false);
            const [currentMonth, setCurrentMonth] = useState('7'); // '7' or '8'
            const [activeExercise, setActiveExercise] = useState(null); // Playing exercise
            const [lokLokExpression, setLokLokExpression] = useState('idle');

            // Workspace states for the interactive worksheets
            const [worksheetAnswers, setWorksheetAnswers] = useState({});
            const [worksheetChecked, setWorksheetChecked] = useState(false);
            const [worksheetResults, setWorksheetResults] = useState({});

            useEffect(() => {
                localStorage.setItem('loklok_completed_days_v2', JSON.stringify(completedDays));
            }, [completedDays]);

            useEffect(() => {
                localStorage.setItem('loklok_stars_v2', stars);
            }, [stars]);

            useEffect(() => {
                localStorage.setItem('loklok_costume_v2', currentCostume);
            }, [currentCostume]);

            useEffect(() => {
                if (lokLokExpression !== 'idle' && activeExercise === null) {
                    const timer = setTimeout(() => setLokLokExpression('idle'), 4000);
                    return () => clearTimeout(timer);
                }
            }, [lokLokExpression]);

            const handleReset = () => {
                if (confirm("家長您好，確定要重新開始所有練習，將星星和進度歸零嗎？")) {
                    playSynthSound('click');
                    setCompletedDays({});
                    setStars(0);
                    setCurrentCostume('plain');
                    setLokLokExpression('idle');
                    localStorage.removeItem('loklok_completed_days_v2');
                    localStorage.removeItem('loklok_stars_v2');
                    localStorage.removeItem('loklok_costume_v2');
                }
            };

            const isDayUnlocked = (dateString, idx) => {
                if (parentMode) return true;
                if (idx === 0) return true;
                const prevDateKey = EXERCISES_DATABASE[idx - 1]?.date;
                return completedDays[prevDateKey] === true;
            };

            const getSpeechBubbleText = () => {
                if (lokLokExpression === 'happy') {
                    return "你太厲害了！答得完全正確！我們獲得了閃亮的星星！🌟🔊";
                }
                if (lokLokExpression === 'wrong') {
                    return "不要緊，我們再看看小祕訣，再試一次吧！樂樂陪你！💪🔊";
                }
                if (lokLokExpression === 'thinking') {
                    return "唔... 聽一聽廣東話，再把正確的詞語拉進去吧！🤔🔊";
                }
                
                const totalCompleted = Object.keys(completedDays).length;
                if (totalCompleted === 62) {
                    return "哇！62天暑假中文挑戰全部完成了！你現在是超強中文小學霸了！🏆🎉🔊";
                }
                if (totalCompleted > 5) {
                    return "我們每天都有進步！快來跟我解鎖太空人和大魔法師裝扮吧！🦁🔊";
                }
                return "你好呀！我是樂樂！這個暑假，讓我們一起依據工作紙精讀挑戰一日一練習！🔊";
            };

            const speakLokLokWelcome = () => {
                speakCantonese(getSpeechBubbleText().replace("🔊", ""));
            };

            const costumesList = [
                { id: 'plain', name: '便服樂樂', cost: 0, icon: '👕' },
                { id: 'chef', name: '小廚神', cost: 5, icon: '🍳' },
                { id: 'astronaut', name: '太空人', cost: 12, icon: '🚀' },
                { id: 'explorer', name: '探險家', cost: 20, icon: '🤠' },
                { id: 'wizard', name: '大魔法師', cost: 30, icon: '🧙‍♂️' }
            ];

            const changeCostume = (costumeId, cost) => {
                if (stars >= cost) {
                    playSynthSound('click');
                    setCurrentCostume(costumeId);
                    setLokLokExpression('happy');
                    setTimeout(() => setLokLokExpression('idle'), 2500);
                }
            };

            // Open popup exercise & initialize its interactive state
            const handleDayClick = (exercise, index) => {
                if (!isDayUnlocked(exercise.date, index)) {
                    playSynthSound('error');
                    alert("請先完成前面的練習，一步一腳印地前進喔！🐾");
                    return;
                }
                playSynthSound('click');
                setActiveExercise({ ...exercise, index });
                setWorksheetAnswers({});
                setWorksheetChecked(false);
                setWorksheetResults({});
                setLokLokExpression('thinking');
            };

            // Handling Cloze / Matching Selection Change inside Worksheet
            const selectOptionForCloze = (partIdx, qId, val) => {
                playSynthSound('click');
                setWorksheetAnswers(prev => ({
                    ...prev,
                    [`${partIdx}_${qId}`]: val
                }));
            };

            const selectFlowerPetal = (partIdx, flowerIdx, petalVal) => {
                playSynthSound('click');
                setWorksheetAnswers(prev => {
                    const key = `${partIdx}_f_${flowerIdx}`;
                    const currentSelected = prev[key] || [];
                    if (currentSelected.includes(petalVal)) {
                        return { ...prev, [key]: currentSelected.filter(p => p !== petalVal) };
                    } else {
                        return { ...prev, [key]: [...currentSelected, petalVal] };
                    }
                });
            };

            // WORKBOOK ANSWERS VERIFICATION (Runs multi-questions checker)
            const handleWorksheetSubmit = () => {
                if (worksheetChecked) return;

                let allCorrect = true;
                const tempResults = {};

                activeExercise.parts.forEach((part, partIdx) => {
                    if (part.type === 'matching' || part.type === 'multiple_choice' || part.type === 'boolean_choices' || part.type === 'punctuation_filling' || part.type === 'cloze_custom' || part.type === 'reading_comp') {
                        part.questions.forEach(q => {
                            const answerKey = `${partIdx}_${q.id}`;
                            const kidAnswer = worksheetAnswers[answerKey];
                            const isCorrect = kidAnswer === q.correct;
                            tempResults[answerKey] = isCorrect;
                            if (!isCorrect) allCorrect = false;
                        });
                    } else if (part.type === 'color_picker') {
                        const answerKey = `${partIdx}_colors`;
                        const kidSelected = worksheetAnswers[answerKey] || [];
                        const isCorrect = kidSelected.length === part.correctAnswers.length && 
                                          kidSelected.every(c => part.correctAnswers.includes(c));
                        tempResults[answerKey] = isCorrect;
                        if (!isCorrect) allCorrect = false;
                    } else if (part.type === 'cloze') {
                        // 12 Cloze answers
                        part.correctAnswers.forEach((ans, blankIdx) => {
                            const answerKey = `${partIdx}_blank_${blankIdx}`;
                            const kidAnswer = worksheetAnswers[answerKey];
                            const isCorrect = kidAnswer === ans;
                            tempResults[answerKey] = isCorrect;
                            if (!isCorrect) allCorrect = false;
                        });
                    } else if (part.type === 'flower_petal') {
                        part.flowers.forEach((flower, fIdx) => {
                            const answerKey = `${partIdx}_f_${fIdx}`;
                            const kidSelected = worksheetAnswers[answerKey] || [];
                            const isCorrect = kidSelected.length === flower.petals.length &&
                                              kidSelected.every(p => flower.petals.includes(p));
                            tempResults[answerKey] = isCorrect;
                            if (!isCorrect) allCorrect = false;
                        });
                    } else if (part.type === 'reorder') {
                        part.questions.forEach(q => {
                            const answerKey = `${partIdx}_${q.id}`;
                            const kidAnswer = worksheetAnswers[answerKey];
                            const isCorrect = kidAnswer === q.correct;
                            tempResults[answerKey] = isCorrect;
                            if (!isCorrect) allCorrect = false;
                        });
                    } else if (part.type === 'word_combination') {
                        part.questions.forEach((q, qIdx) => {
                            const answerKey = `${partIdx}_wc_${qIdx}`;
                            const kidAnswer = worksheetAnswers[answerKey];
                            const isCorrect = kidAnswer === q.match;
                            tempResults[answerKey] = isCorrect;
                            if (!isCorrect) allCorrect = false;
                        });
                    }
                });

                setWorksheetResults(tempResults);
                setWorksheetChecked(true);

                if (allCorrect) {
                    playSynthSound('success');
                    setLokLokExpression('happy');
                    if (!completedDays[activeExercise.date]) {
                        setStars(prev => prev + 1);
                        setCompletedDays(prev => ({
                            ...prev,
                            [activeExercise.date]: true
                        }));
                    }
                } else {
                    playSynthSound('error');
                    setLokLokExpression('wrong');
                }
            };

            const getDaysInMonthArray = (month) => {
                const emptySlots = month === '7' ? 3 : 6;
                const totalDays = 31;
                const arr = [];
                for (let i = 0; i < emptySlots; i++) arr.push(null);
                for (let d = 1; d <= totalDays; d++) {
                    const dayStr = d < 10 ? `0${d}` : `${d}`;
                    const dateStr = `2026-0${month}-${dayStr}`;
                    const exerciseIndex = EXERCISES_DATABASE.findIndex(e => e.date === dateStr);
                    arr.push({
                        dayNum: d,
                        dateStr: dateStr,
                        exercise: EXERCISES_DATABASE[exerciseIndex],
                        index: exerciseIndex
                    });
                }
                return arr;
            };

            const calendarDays = getDaysInMonthArray(currentMonth);

            const getMonthCompletionCount = (month) => {
                let count = 0;
                for (let d = 1; d <= 31; d++) {
                    const dayStr = d < 10 ? `0${d}` : `${d}`;
                    const dateStr = `2026-0${month}-${dayStr}`;
                    if (completedDays[dateStr]) count++;
                }
                return count;
            };

            return (
                <div className="container mx-auto px-4 py-6 max-w-6xl">
                    
                    {/* HEADER */}
                    <header className="flex flex-col md:flex-row items-center justify-between gap-4 bg-white p-6 rounded-3xl border-4 border-yellow-300 shadow-lg mb-8 relative overflow-hidden">
                        <div className="absolute top-0 left-0 right-0 h-3 bg-gradient-to-r from-red-400 via-orange-400 via-yellow-400 via-green-400 via-blue-400 to-purple-400"></div>
                        
                        <div className="flex items-center gap-4">
                            <div className="bg-yellow-100 p-3 rounded-full text-4xl animate-bounce">
                                🎒
                            </div>
                            <div>
                                <h1 className="text-3xl md:text-4xl font-black text-sky-500 font-playful flex items-center gap-2">
                                    樂樂的暑期中文大作戰
                                </h1>
                                <p className="text-slate-500 text-sm md:text-base font-medium mt-1">
                                    📖 依據精讀練習，專為小一升小二量身定製的 62 天學習日曆 (2026版)
                                </p>
                            </div>
                        </div>

                        <div className="flex flex-wrap items-center gap-3">
                            <label className="flex items-center gap-2 bg-purple-50 hover:bg-purple-100 px-4 py-2 rounded-full border-2 border-purple-200 cursor-pointer transition-all">
                                <span className="text-xs font-bold text-purple-700">🔑 測試解鎖模式</span>
                                <input 
                                    type="checkbox" 
                                    checked={parentMode} 
                                    onChange={(e) => {
                                        playSynthSound('click');
                                        setParentMode(e.target.checked);
                                    }} 
                                    className="w-4 h-4 accent-purple-600 rounded cursor-pointer"
                                />
                            </label>
                            <button 
                                onClick={handleReset}
                                className="bg-rose-50 hover:bg-rose-100 text-rose-600 border-2 border-rose-200 px-4 py-2 rounded-full text-xs font-bold transition-all"
                            >
                                🔄 重設進度
                            </button>
                        </div>
                    </header>

                    {/* MAIN CONTAINER */}
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                        
                        {/* LEFT COLUMN: CHARACTER HUB */}
                        <aside className="lg:col-span-4 bg-white rounded-3xl border-4 border-sky-300 p-6 shadow-xl flex flex-col items-center relative">
                            
                            <div className="absolute top-4 right-4 bg-amber-100 border-2 border-amber-300 px-4 py-2 rounded-full flex items-center gap-1 shadow-sm">
                                <span className="text-2xl animate-pulse">⭐</span>
                                <span className="text-xl font-bold text-amber-700 font-playful">{stars}</span>
                            </div>

                            <div className="text-center mt-2">
                                <span className="bg-sky-100 text-sky-700 text-xs font-black uppercase px-3 py-1 rounded-full tracking-wider">
                                    陪伴學習小夥伴
                                </span>
                                <h2 className="text-2xl font-bold text-slate-700 mt-1">
                                    主角：樂樂
                                </h2>
                            </div>

                            <div className="w-56 h-56 my-4 bg-gradient-to-b from-sky-50 to-blue-100 rounded-full border-4 border-white shadow-inner flex items-center justify-center p-4 relative group">
                                <LokLokCharacter costume={currentCostume} expression={lokLokExpression} />
                                <button 
                                    onClick={speakLokLokWelcome}
                                    title="播放廣東話迎賓語"
                                    className="absolute bottom-1 right-1 bg-yellow-400 hover:bg-yellow-500 text-yellow-950 p-2.5 rounded-full shadow-md text-lg transition-all border-2 border-white"
                                >
                                    🔊
                                </button>
                            </div>

                            {/* SPEECH BUBBLE */}
                            <div className="w-full bg-amber-50 border-2 border-amber-200 p-4 rounded-2xl relative mb-6">
                                <div className="absolute left-1/2 -top-3 -translate-x-1/2 w-0 h-0 border-l-8 border-l-transparent border-r-8 border-r-transparent border-b-8 border-b-amber-50"></div>
                                <p className="text-slate-700 font-bold text-sm leading-relaxed text-center">
                                    {getSpeechBubbleText()}
                                </p>
                            </div>

                            {/* PROGRESS TRACKER */}
                            <div className="w-full border-t-2 border-slate-100 pt-4 mb-6">
                                <div className="flex justify-between text-xs font-bold text-slate-500 mb-1">
                                    <span>暑期大作戰進度</span>
                                    <span>{Object.keys(completedDays).length} / 62 天</span>
                                </div>
                                <div className="w-full h-4 bg-slate-100 rounded-full overflow-hidden p-0.5 border border-slate-200">
                                    <div 
                                        className="h-full bg-gradient-to-r from-emerald-400 to-green-500 rounded-full transition-all duration-500"
                                        style={{ width: `${(Object.keys(completedDays).length / 62) * 100}%` }}
                                    ></div>
                                </div>
                            </div>

                            {/* COSTUME CABINET */}
                            <div className="w-full">
                                <h3 className="text-sm font-black text-slate-500 mb-3 flex items-center gap-1 border-b pb-2">
                                    👕 樂樂的暑假大衣櫃
                                </h3>
                                <div className="grid grid-cols-1 gap-2">
                                    {costumesList.map((item) => {
                                        const isUnlocked = stars >= item.cost;
                                        const isEquipped = currentCostume === item.id;
                                        return (
                                            <button
                                                key={item.id}
                                                disabled={!isUnlocked}
                                                onClick={() => changeCostume(item.id, item.cost)}
                                                className={`flex items-center justify-between p-2 rounded-xl border-2 transition-all text-left ${
                                                    isEquipped 
                                                        ? 'border-emerald-400 bg-emerald-50 text-emerald-800 font-bold' 
                                                        : isUnlocked
                                                            ? 'border-slate-200 hover:border-sky-300 hover:bg-sky-50 text-slate-700'
                                                            : 'border-slate-100 bg-slate-50 text-slate-400 cursor-not-allowed'
                                                }`}
                                            >
                                                <div className="flex items-center gap-2">
                                                    <span className="text-xl">{item.icon}</span>
                                                    <div className="text-xs">
                                                        <p className="font-bold">{item.name}</p>
                                                        {!isUnlocked && (
                                                            <p className="text-[10px] text-amber-500 font-medium">需 {item.cost} 顆星星 ⭐</p>
                                                        )}
                                                    </div>
                                                </div>
                                                <div>
                                                    {isEquipped ? (
                                                        <span className="text-xs bg-emerald-200 text-emerald-800 px-2.5 py-0.5 rounded-full font-bold">已換上</span>
                                                    ) : isUnlocked ? (
                                                        <span className="text-xs bg-sky-100 text-sky-700 px-2.5 py-0.5 rounded-full">更換</span>
                                                    ) : (
                                                        <span className="text-xs text-slate-400">🔒 鎖定</span>
                                                    )}
                                                </div>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                        </aside>

                        {/* RIGHT COLUMN: CALENDAR BOARD */}
                        <main className="lg:col-span-8 bg-white rounded-3xl border-4 border-yellow-300 p-6 shadow-xl">
                            
                            {/* MONTH TABS */}
                            <div className="flex bg-slate-100 p-1.5 rounded-2xl mb-6">
                                <button
                                    onClick={() => { playSynthSound('click'); setCurrentMonth('7'); }}
                                    className={`flex-1 py-3 text-center rounded-xl font-bold font-playful text-lg transition-all ${
                                        currentMonth === '7'
                                            ? 'bg-sky-400 text-white shadow-md'
                                            : 'text-slate-600 hover:text-sky-500'
                                    }`}
                                >
                                    ☀️ 7月份・暑期中文挑戰 ({getMonthCompletionCount('7')}/31)
                                </button>
                                <button
                                    onClick={() => { playSynthSound('click'); setCurrentMonth('8'); }}
                                    className={`flex-1 py-3 text-center rounded-xl font-bold font-playful text-lg transition-all ${
                                        currentMonth === '8'
                                            ? 'bg-orange-400 text-white shadow-md'
                                            : 'text-slate-600 hover:text-orange-500'
                                    }`}
                                >
                                    🏖️ 8月份・更上一層樓 ({getMonthCompletionCount('8')}/31)
                                </button>
                            </div>

                            {/* WEEK LABELS */}
                            <div className="grid grid-cols-7 gap-2 text-center font-bold text-slate-400 text-xs md:text-sm mb-3">
                                <div className="text-rose-400">日</div>
                                <div>一</div>
                                <div>二</div>
                                <div>三</div>
                                <div>四</div>
                                <div>五</div>
                                <div className="text-sky-400">六</div>
                            </div>

                            {/* CALENDAR TILES */}
                            <div className="grid grid-cols-7 gap-2">
                                {calendarDays.map((day, index) => {
                                    if (!day) {
                                        return <div key={`empty-${index}`} className="aspect-square bg-slate-50 opacity-40 rounded-2xl"></div>;
                                    }

                                    const isCompleted = completedDays[day.dateStr] === true;
                                    const unlocked = isDayUnlocked(day.dateStr, day.index);
                                    
                                    let btnStyle = "bg-slate-50 border-2 border-slate-200 text-slate-300 cursor-not-allowed";
                                    let badgeStyle = "bg-slate-200 text-slate-400";
                                    
                                    if (isCompleted) {
                                        btnStyle = "bg-gradient-to-br from-green-50 to-emerald-100 hover:from-green-100 hover:to-emerald-200 border-2 border-green-400 text-emerald-800 cursor-pointer shadow-sm hover:scale-105";
                                        badgeStyle = "bg-green-400 text-white";
                                    } else if (unlocked) {
                                        btnStyle = currentMonth === '7'
                                            ? "bg-gradient-to-br from-sky-50 to-sky-100 hover:from-sky-100 hover:to-sky-200 border-2 border-sky-400 text-sky-800 cursor-pointer shadow-md hover:scale-105 animate-pulse"
                                            : "bg-gradient-to-br from-orange-50 to-orange-100 hover:from-orange-100 hover:to-orange-200 border-2 border-orange-400 text-orange-800 cursor-pointer shadow-md hover:scale-105 animate-pulse";
                                        badgeStyle = currentMonth === '7' ? "bg-sky-500 text-white" : "bg-orange-500 text-white";
                                    }

                                    return (
                                        <button
                                            key={day.dateStr}
                                            onClick={() => handleDayClick(day.exercise, day.index)}
                                            disabled={!unlocked}
                                            className={`aspect-square rounded-2xl p-1 md:p-2 flex flex-col justify-between items-center relative transition-all ${btnStyle}`}
                                        >
                                            <span className={`text-[10px] md:text-xs font-black px-1.5 py-0.5 rounded-full self-start ${badgeStyle}`}>

                                                                </div>
                                                                {worksheetChecked && (
                                                                    <div className={`text-xs font-bold mt-2 ${isCorrect ? 'text-emerald-600' : 'text-rose-500'}`}>
                                                                        {isCorrect ? '🟢 配詞成功' : '🔴 配詞不對'}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            )}

                                            {/* TYPE: Sentence Reordering */}
                                            {part.type === "reorder" && (
                                                <div className="space-y-4">
                                                    {part.questions.map((q) => {
                                                        const answerKey = `${partIdx}_${q.id}`;
                                                        const userSel = worksheetAnswers[answerKey] || "";
                                                        const isCorrect = worksheetResults[answerKey];

                                                        return (
                                                            <div key={q.id} className="bg-orange-50/50 p-4 rounded-2xl border-2 border-orange-100">
                                                                <div className="flex justify-between items-start mb-2">
                                                                    <div>
                                                                        <p className="text-xs text-slate-400 mb-1">🏷️ 打亂的字詞：</p>
                                                                        <div className="flex flex-wrap gap-1.5">
                                                                            {q.words.map((w, wIdx) => (
                                                                                <span key={wIdx} className="bg-white border border-orange-200 text-slate-700 font-bold px-2.5 py-1 rounded-lg text-xs shadow-sm">
                                                                                    {w}
                                                                                </span>
                                                                            ))}
                                                                        </div>
                                                                    </div>
                                                                    <button 
                                                                        onClick={() => speakCantonese(q.words.join(" "))}
                                                                        className="bg-orange-100 hover:bg-orange-200 p-1.5 rounded-full"
                                                                    >
                                                                        🔊
                                                                    </button>
                                                                </div>

                                                                <div className="mt-3">
                                                                    <p className="text-xs text-slate-500 mb-1">✍️ 重組句子結果：</p>
                                                                    <input 
                                                                        type="text"
                                                                        disabled={worksheetChecked}
                                                                        placeholder="請手動輸入或將排好的句子打進來（例：春天來了。）"
                                                                        value={userSel}
                                                                        onChange={(e) => selectOptionForCloze(partIdx, q.id, e.target.value)}
                                                                        className="w-full bg-white border border-slate-300 rounded-xl px-3 py-2 text-sm text-slate-800 focus:ring-2 focus:ring-orange-300 outline-none"
                                                                    />
                                                                </div>

                                                                {worksheetChecked && (
                                                                    <div className={`mt-2 text-xs font-bold ${isCorrect ? 'text-emerald-600' : 'text-rose-500'}`}>
                                                                        {isCorrect 
                                                                            ? '🟢 句子重組完全正確！' 
                                                                            : `🔴 重組有誤，正確答案是：『${q.correct}』`}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            )}

                                            {/* TYPE: Custom Cloze / Sentence continuation */}
                                            {part.type === "cloze_custom" && (
                                                <div className="space-y-4">
                                                    {part.questions.map((q) => {
                                                        const answerKey = `${partIdx}_${q.id}`;
                                                        const userSel = worksheetAnswers[answerKey] || "";
                                                        const isCorrect = worksheetResults[answerKey];

                                                        return (
                                                            <div key={q.id} className="bg-indigo-50/50 p-4 rounded-2xl border-2 border-indigo-100">
                                                                <div className="flex justify-between items-center mb-2">
                                                                    <span className="font-bold text-slate-800 text-sm">{q.text} {userSel || "______"}</span>
                                                                    <button onClick={() => speakCantonese(q.text + (userSel || ""))} className="text-xs">🔊</button>
                                                                </div>
                                                                <div className="flex flex-wrap gap-2">
                                                                    {q.options.map(opt => (
                                                                        <button
                                                                            key={opt}
                                                                            disabled={worksheetChecked}
                                                                            onClick={() => selectOptionForCloze(partIdx, q.id, opt)}
                                                                            className={`px-3 py-1.5 rounded-lg text-xs font-bold border ${
                                                                                userSel === opt 
                                                                                    ? 'bg-indigo-500 border-indigo-600 text-white shadow-md' 
                                                                                    : 'bg-white border-slate-200 hover:bg-slate-100'
                                                                            }`}
                                                                        >
                                                                            {opt}
                                                                        </button>
                                                                    ))}
                                                                </div>
                                                                {worksheetChecked && (
                                                                    <div className={`mt-2 text-xs font-bold ${isCorrect ? 'text-emerald-600' : 'text-rose-500'}`}>
                                                                        {isCorrect ? '🟢 續寫正確！' : `🔴 錯了，提示：${q.hint}`}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            )}

                                            {/* TYPE: Reading Comprehension */}
                                            {part.type === "reading_comp" && (
                                                <div className="space-y-6">
                                                    {/* The passage */}
                                                    <div className="bg-teal-50 border-2 border-teal-100 p-4 rounded-2xl relative">
                                                        <div className="flex justify-between items-center border-b border-teal-100 pb-2 mb-3">
                                                            <span className="font-bold text-teal-800 text-sm">📖 短文閱讀（認真讀一讀）：</span>
                                                            <button 
                                                                onClick={() => speakCantonese(part.passage)}
                                                                className="bg-teal-100 hover:bg-teal-200 text-teal-900 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1 transition-all animate-pulse"
                                                            >
                                                                🔊 粵語全文朗讀
                                                            </button>
                                                        </div>
                                                        <div className="text-slate-700 text-sm leading-relaxed whitespace-pre-line font-medium bg-white/80 p-3 rounded-xl border border-teal-50">
                                                            {part.passage}
                                                        </div>
                                                    </div>

                                                    {/* The Reading questions */}
                                                    <div className="space-y-4">
                                                        <p className="text-xs font-black text-teal-700">✍️ 閱讀理解題目：</p>
                                                        {part.questions.map((q) => {
                                                            const answerKey = `${partIdx}_${q.id}`;
                                                            const userSel = worksheetAnswers[answerKey] || "";
                                                            const isCorrect = worksheetResults[answerKey];

                                                            return (
                                                                <div key={q.id} className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                                                    <div className="flex justify-between items-start gap-4 mb-2">
                                                                        <span className="font-bold text-slate-800 text-xs md:text-sm leading-relaxed">
                                                                            {q.text.replace("(   )", ` ( ${userSel || "___"} ) `)}
                                                                        </span>
                                                                        <button 
                                                                            onClick={() => speakCantonese(q.text.replace("(   )", userSel || "空格"))}
                                                                            className="text-xs"
                                                                        >
                                                                            🔊
                                                                        </button>
                                                                    </div>
                                                                    <div className="flex flex-wrap gap-2">
                                                                        {q.options.map(opt => (
                                                                            <button
                                                                                key={opt}
                                                                                disabled={worksheetChecked}
                                                                                onClick={() => selectOptionForCloze(partIdx, q.id, opt)}
                                                                                className={`px-3 py-1.5 rounded-lg text-xs font-bold border transition-all ${
                                                                                    userSel === opt 
                                                                                        ? 'bg-teal-500 border-teal-600 text-white shadow-md'
                                                                                        : 'bg-white hover:bg-slate-100 border-slate-200 text-slate-700'
                                                                                }`}
                                                                            >
                                                                                {opt}
                                                                            </button>
                                                                        ))}
                                                                    </div>
                                                                    {worksheetChecked && (
                                                                        <div className={`mt-2 text-xs font-bold ${isCorrect ? 'text-emerald-600' : 'text-rose-500'}`}>
                                                                            {isCorrect ? '🟢 答案正確！' : '🔴 回答不正確。'}
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            )}

                                        </div>
                                    ))}

                                </div>

                                {/* BOTTOM ACTIONS PANEL OF WORKBOOK */}
                                <div className="border-t-2 border-slate-100 pt-4 mt-auto flex flex-col sm:flex-row items-center justify-between gap-4">
                                    <div className="text-slate-500 text-xs text-center sm:text-left">
                                        {worksheetChecked 
                                            ? "核對完結！如全對即可獲發星星 ⭐，若有錯可關閉重新挑戰！" 
                                            : "請答完上面所有部分的題目，然後點右邊的按鈕核對！"}
                                    </div>
                                    <div className="flex gap-2 w-full sm:w-auto justify-end">
                                        {!worksheetChecked ? (
                                            <button
                                                onClick={handleWorksheetSubmit}
                                                className="w-full sm:w-auto bg-gradient-to-r from-emerald-400 to-green-500 hover:from-emerald-500 hover:to-green-600 text-white font-black py-3 px-8 rounded-full shadow-lg transition-all"
                                            >
                                                🔍 提交並核對所有答案
                                            </button>
                                        ) : (
                                            <button
                                                onClick={() => { playSynthSound('click'); setActiveExercise(null); setLokLokExpression('idle'); window.speechSynthesis.cancel(); }}
                                                className="w-full sm:w-auto bg-slate-500 hover:bg-slate-600 text-white font-bold py-3 px-8 rounded-full shadow-md transition-all"
                                            >
                                                關閉練習 ➡️
                                            </button>
                                        )}
                                    </div>
                                </div>

                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
