    <!-- CORE SCRIPT (COMPILATION GUARANTEED) -->
    <script>
        // --- SOUND GENERATOR ---
        const playSound = (type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'correct') {
                    const now = ctx.currentTime;
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(523.25, now); // C5
                    osc.frequency.setValueAtTime(659.25, now + 0.1); // E5
                    osc.frequency.setValueAtTime(783.99, now + 0.2); // G5
                    osc.frequency.setValueAtTime(1046.50, now + 0.3); // C6
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.15, now + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                    osc.start(now);
                    osc.stop(now + 0.5);
                } else if (type === 'wrong') {
                    const now = ctx.currentTime;
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(220, now); // A3
                    osc.frequency.linearRampToValueAtTime(110, now + 0.3); // A2
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.15, now + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                    osc.start(now);
                    osc.stop(now + 0.4);
                } else if (type === 'click') {
                    const now = ctx.currentTime;
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, now);
                    osc.frequency.exponentialRampToValueAtTime(150, now + 0.08);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
                    osc.start(now);
                    osc.stop(now + 0.08);
                }
            } catch (e) {
                console.log('AudioContext not allowed or supported yet');
            }
        };

        // --- HELPER FUNCTIONS ---
        const shuffleArray = (array) => {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        };

        // --- STREAMING_CHUNK:Declaring cute animal icon parameters... ---
        // 14 Days Cute Animal Icons list (Fixes dayAnimals is not defined bug)
        const dayAnimals = ["🐶", "🐱", "🐰", "🦊", "🦁", "🐨", "🐼", "🐻", "🐸", "🐔", "🐧", "🐵", "🦄", "👑"];

        let isAnswerRevealed = false; // Declaring state lock for validation reviews

        // --- 14 DAYS CURRICULUM DATABASE (DAYS 1-10 FROM USER ARTIFACT, 11-14 ADDED) ---
        const exercises = {
            1: {
                day: 1,
                title: "第一天：字的偏旁 (一) 🧩",
                tip: "有些漢字由兩個 or 以上的部分組成，這些組成部分稱為「偏旁」。例如：「媽」由「女」和「馬」兩個偏旁組成。",
                type: "cloze",
                instruction: "請幫偏旁找到好朋友，組合成正確的字吧！",
                audioText: "字的偏旁一。請幫偏旁找到好朋友，組合成正確的字吧！",
                questions: [
                    { id: "q1", text: "目 + 民 = ", options: ["眠", "眼", "睛", "民"], answer: "眠", hint: "跟睡覺（合上眼睛）有關哦！" },
                    { id: "q2", text: "女 + 乃 = ", options: ["媽", "奶", "姐", "妹"], answer: "奶", hint: "喝牛奶，或者是叫奶奶！" },
                    { id: "q3", text: "耳 + 又 = ", options: ["取", "最", "聯", "聰"], answer: "取", hint: "拿取、取得的意思。" },
                    { id: "q4", text: "日 + 月 = ", options: ["明", "朋", "唱", "晴"], answer: "明", hint: "明天、明亮，有太陽 and 月亮。" }
                ]
            },
            2: {
                day: 2,
                title: "第二天：名詞(一) 中秋節的故事 🥮",
                tip: "名詞是表示人物、地方、事物等名稱的詞。例如：爸爸、香蕉、公園。",
                type: "pairing",
                instruction: "根據意思，選出最適合的名詞填寫故事：",
                audioText: "名詞一，中秋節的故事。根據意思，選出最適合的名詞填寫故事。",
                questions: [
                    { 
                        id: "q1", 
                        text: "今天是中秋節，我們全家人一起過節。奶奶和（ 0 ）去（ 1 ）買了很多菜，有一個大（ 2 ）、幾個紅紅的（ 3 ），還有長長的（ 4 ）。看！她們正在做晚飯呢。（ 5 ）和我坐在沙發上看電視。門鈴響了，我去開門。原來是（ 6 ）回來了。", 
                        options: ["媽媽", "菜市場", "冬瓜", "番茄", "豆角", "爺爺", "爸爸"], 
                        answers: ["媽媽", "菜市場", "冬瓜", "番茄", "豆角", "爺爺", "爸爸"]

                    {

                        text: "晚飯後，我們到（ 0 ）去。天上掛着圓圓的（ 1 ），我們一邊看，一邊吃（ 2 ）和（ 3 ）等水果。忽然，我聞到一陣香氣，原來媽媽在切（ 4 ）。它軟軟的，又香又甜，實在太好吃了。這個中秋夜過得真愉快！",

            3: {

                type: "pairing",
                instruction: "請選擇最適當的動詞填入句子中：",
                audioText: "動詞一，動作大作戰。請選擇最適當的動詞填入句子中。",

            },
            4: {
                day: 4,
                title: "第四天：形容詞(一) 繽紛顏色詞 🎨",
                tip: "顏色詞是用來描述事物的不同色彩，使事物的形象更具體。常用的顏色詞有：紅、黃、綠、藍、紫、黑、白、灰等。",
                type: "pairing",
                instruction: "選出最適合的顏色詞填入句子中：",
                audioText: "形容詞一，繽紛顏色詞。選出最適合的顏色詞填入句子中。",
                questions: [
                    {

        // Safe helpers for feedback & Mascot UI
        function setMascotFeedback(msg) {
            document.getElementById('lele-feedback').textContent = msg;
        }

        function loadProgress() {
            const savedProg = localStorage.getItem('lele_rabbit_progress');
            const savedLang = localStorage.getItem('lele_rabbit_tts_lang');
            const savedFont = localStorage.getItem('lele_rabbit_font');
            
            if (savedProg) {
                try { progress = JSON.parse(savedProg); } catch(e) { progress = {}; }
            } else {
                progress = { 1: true, 2: true, 3: true, 4: true, 5: true, 6: true, 7: true, 8: true, 9: true, 10: true };
            }
            if (savedLang) {
                document.getElementById('tts-lang').value = savedLang;
            }
            if (savedFont) {
                fontSizeMode = savedFont;
            }
            updateStarCounter();
        }

        function saveProgress() {
            localStorage.setItem('lele_rabbit_progress', JSON.stringify(progress));
            updateStarCounter();
        }

        function saveLanguagePreference() {
            const val = document.getElementById('tts-lang').value;
            localStorage.setItem('lele_rabbit_tts_lang', val);
            playSound('click');
        }

        function updateStarCounter() {
            let stars = 0;
            for (let i = 1; i <= 14; i++) {
                if (progress[i] === true) stars++;
            }
            document.getElementById('star-count').textContent = stars;
        }

        function resetProgress() {
            playSound('click');
            progress = {};
            userAnswers = {};
            reorderSelections = {};
            isAnswerRevealed = false;
            saveProgress();
            buildCalendar();
            loadExercise(1);
            setMascotExpression('neutral');
            setMascotFeedback("🐰 所有的挑戰記錄都重設囉！讓我們和樂樂兔一起從第 1 天重新出發吧！");
        }

        // --- ACCESSIBILITY FONT ADJUSTMENT (Standard and Xlarge Only) ---
        function changeFontSize(mode) {
            playSound('click');
            fontSizeMode = mode;
            localStorage.setItem('lele_rabbit_font', mode);
            
            document.querySelectorAll('.font-size-btn').forEach(btn => {
                btn.className = "font-size-btn px-4 py-1 text-xs md:text-sm font-bold rounded-full text-sky-700 hover:bg-sky-200 transition-all";
            });
            const activeBtn = document.getElementById(`font-${mode}`);
            if (activeBtn) {
                activeBtn.className = "font-size-btn px-4 py-1 text-xs md:text-sm font-bold rounded-full bg-sky-500 text-white shadow-md transform scale-105 transition-all";
            }

            const mult = { standard: '1rem', xlarge: '1.4rem' }[mode];
            document.getElementById('main-content-area').style.fontSize = mult;
        }

        // --- STREAMING_CHUNK:Structuring calendar grid with cute animals... ---
        function buildCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            for (let d = 1; d <= 14; d++) {
                const isCompleted = progress[d] === true;
                const isActive = d === currentDay;
                const animalIcon = dayAnimals[d - 1] || "🦁";

                let btnClass = "relative flex flex-col items-center justify-center p-2 rounded-xl border-2 comic-shadow transition-all btn-bounce cursor-pointer ";
                if (isActive) {
                    btnClass += "bg-sky-500 border-sky-600 text-white font-black scale-105 z-10";
                } else if (isCompleted) {
                    btnClass += "bg-sky-100/50 border-sky-300 text-sky-800 font-bold";
                } else {
                    btnClass += "bg-white hover:bg-sky-50 border-slate-200 text-slate-700 font-bold";
                }

                const item = document.createElement('div');
                item.className = btnClass;
                item.setAttribute('onclick', `selectDay(${d})`);

                let starBadge = "";
                if (isCompleted) {
                    starBadge = `<span class="absolute top-1 right-1 text-yellow-500 text-xs animate-pulse"><i class="fa-solid fa-star"></i></span>`;
                }

                item.innerHTML = `
                    ${starBadge}
                    <span class="text-xl mb-0.5">${animalIcon}</span>
                    <span class="text-[9px] uppercase tracking-wider opacity-80">Day</span>
                    <span class="text-base font-extrabold">${d}</span>
                `;

                grid.appendChild(item);
            }
        }

        function selectDay(d) {
            playSound('click');
            currentDay = d;
            isAnswerRevealed = false; // Reset reveal status when switching days
            buildCalendar();
            loadExercise(d);
            setMascotExpression('thinking');
            setMascotFeedback(`🐰 翻開了第 ${d} 天的挑戰日曆！仔細閱讀小秘訣再答題，你肯定能做對！`);
        }

        // --- EXERCISE LOADING SYSTEM ---
        function loadExercise(dayNum) {
            const ex = exercises[dayNum];
            if (!ex) return;

            document.getElementById('current-day-badge').textContent = `第 ${dayNum} 天挑戰`;
            document.getElementById('exercise-title').textContent = ex.title;
            document.getElementById('exercise-tip').innerHTML = `<strong>💡 樂樂兔精讀小秘訣：</strong>${ex.tip}`;

            // Reset action buttons based on whether answers are already revealed
            if (isAnswerRevealed) {
                document.getElementById('check-btn').classList.add('hidden');
                document.getElementById('next-btn').classList.remove('hidden');
                document.getElementById('status-message').classList.add('hidden');
            } else {
                document.getElementById('check-btn').classList.remove('hidden');
                document.getElementById('next-btn').classList.add('hidden');
                document.getElementById('status-message').classList.add('hidden');
            }

            const workspace = document.getElementById('question-workspace');
            workspace.innerHTML = '';

            if (ex.type === "cloze") {
                renderClozeType(ex, workspace);
            } else if (ex.type === "pairing") {
                renderPairingType(ex, workspace);
            } else if (ex.type === "punctuation") {
                renderPunctuationType(ex, workspace);
            } else if (ex.type === "reorder") {
                renderReorderType(ex, workspace);
            } else if (ex.type === "reading_comp") {
                renderReadingCompType(ex, workspace);
            }
        }

        function saveOptionState(qId, val, subKey = null) {
            const saveKey = `${currentDay}_${qId}`;
            if (subKey !== null) {
                if (!userAnswers[saveKey] || typeof userAnswers[saveKey] !== 'object') {
                    userAnswers[saveKey] = {};
                }
                userAnswers[saveKey][subKey] = val;
            } else {
                userAnswers[saveKey] = val;
            }
        }

        function getOptionState(qId, subKey = null) {
            const saveKey = `${currentDay}_${qId}`;
            const existing = userAnswers[saveKey];
            if (subKey !== null) {
                return (existing && typeof existing === 'object') ? existing[subKey] || "" : "";
            }
            return (typeof existing === 'string') ? existing : "";
        }

        // --- AUDIO HELPERS FOR INDIVIDUAL QUESTIONS/SENTENCES ---
        function speakSelectedText(text) {
            const lang = document.getElementById('tts-lang').value;
            // Clean placeholders for cleaner TTS speech
            const cleanText = text.replace(/（\s*\d+\s*）/g, " 括號 ").replace(/\[\s*\?\s*\]/g, " 括號 ");
            speakText(cleanText, lang);
        }

        // --- STREAMING_CHUNK:Rendering cloze interactive options... ---
        // --- RENDER TYPE 1: CLOZE MCQs ---
        function renderClozeType(ex, workspace) {
            const container = document.createElement('div');
            container.className = "space-y-4";

            ex.questions.forEach((q, qIdx) => {
                const card = document.createElement('div');
                card.className = "p-4 rounded-xl border-2 border-slate-100 bg-slate-50/50 hover:bg-white transition-all space-y-3";

                const hBox = document.createElement('div');
                hBox.className = "flex items-start space-x-2";
                
                const badge = `<span class="bg-sky-500 text-white text-xs font-black rounded-full w-5 h-5 flex items-center justify-center mt-1 flex-shrink-0">${qIdx + 1}</span>`;
                
                const savedValue = getOptionState(q.id);
                const displayValue = isAnswerRevealed ? q.answer : (savedValue || "？");
                
                const underlineColor = isAnswerRevealed ? "text-sky-600 border-sky-400 font-extrabold" : "text-sky-600 border-sky-400 font-black";
                
                // Add TTS audio speaker button right next to each question sentence
                const textSpan = `
                    <div class="font-extrabold text-[#2D3748] flex-grow flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                        <span>${q.text} <span id="cloze-underline-${q.id}" class="${underlineColor} border-b-2 px-3 inline-block">${displayValue}</span></span>
                        <button onclick="speakSelectedText('${q.text.replace(/'/g, "\\'")}')" class="text-xs text-sky-600 bg-sky-50 border border-sky-200 px-2 py-0.5 rounded-full hover:bg-sky-100 font-bold self-start sm:self-center">
                            <i class="fa-solid fa-volume-high"></i> 🔊 讀句子
                        </button>
                    </div>`;
                
                hBox.innerHTML = badge + textSpan;
                card.appendChild(hBox);

                const optGrid = document.createElement('div');
                optGrid.className = "grid grid-cols-2 md:grid-cols-4 gap-2 pt-2";

                const randomizedOptions = shuffleArray(q.options);

                randomizedOptions.forEach((opt) => {
                    const btn = document.createElement('button');
                    
                    let activeClasses = "bg-white hover:bg-sky-50 text-slate-700 border-slate-200";
                    if (isAnswerRevealed) {
                        if (opt === q.answer) {
                            activeClasses = "bg-emerald-500 text-white border-emerald-600 shadow-md";
                        } else if (opt === savedValue) {
                            activeClasses = "bg-red-500 text-white border-red-600 shadow-md";
                        } else {
                            activeClasses = "bg-slate-50 text-slate-400 border-slate-100 cursor-not-allowed";
                        }
                        btn.disabled = true;
                    } else if (savedValue === opt) {
                        activeClasses = "bg-sky-500 text-white border-sky-600 shadow-md transform -translate-y-0.5";
                    }

                    btn.className = `py-2.5 px-4 rounded-xl border-2 font-black text-sm transition-all ${isAnswerRevealed ? '' : 'btn-bounce'} ${activeClasses}`;
                    btn.textContent = opt;
                    if (!isAnswerRevealed) {
                        btn.setAttribute('onclick', `selectClozeOption('${q.id}', '${opt}', this)`);
                    }
                    optGrid.appendChild(btn);
                });

                card.appendChild(optGrid);

                if (q.hint && !isAnswerRevealed) {
                    const hintP = document.createElement('p');
                    hintP.className = "text-xs text-sky-500 font-bold flex items-center gap-1 mt-1";
                    hintP.innerHTML = `<i class="fa-solid fa-circle-info"></i> 提示：${q.hint}`;
                    card.appendChild(hintP);
                }

                container.appendChild(card);
            });

            workspace.appendChild(container);
        }

        function selectClozeOption(qId, val, btnEl) {
            if (isAnswerRevealed) return;
            playSound('click');
            saveOptionState(qId, val);

            const parent = btnEl.parentElement;
            parent.querySelectorAll('button').forEach(b => {
                b.className = "py-2.5 px-4 rounded-xl border-2 font-black text-sm transition-all btn-bounce bg-white hover:bg-sky-50 text-slate-700 border-slate-200";
            });
            btnEl.className = "py-2.5 px-4 rounded-xl border-2 font-black text-sm transition-all btn-bounce bg-sky-500 text-white border-sky-600 shadow-md transform -translate-y-0.5";

            document.getElementById(`cloze-underline-${qId}`).textContent = val;
            setMascotExpression('thinking');
            setMascotFeedback(`🐰 你的選擇是「${val}」，對不對？快填好其餘題目哦！`);
        }

        // --- STREAMING_CHUNK:Rendering pairing line-by-line options... ---
        // --- RENDER TYPE 2: PAIRING SELECTS (Formatted line-by-line for 6, 7, 12) ---
        function renderPairingType(ex, workspace) {
            const container = document.createElement('div');
            container.className = "space-y-4";

            ex.questions.forEach((q, qIdx) => {
                const card = document.createElement('div');
                card.className = "p-5 rounded-2xl border-2 border-slate-100 bg-slate-50/50 space-y-4";

                // Split paragraph text by newline to render each sentence on its own row
                const textLines = q.text.split('\n');
                
                const randomizedPairOptions = shuffleArray(q.options);

                // We keep track of the total number of dropdowns processed across lines
                let totalSelectIdx = 0;

                textLines.forEach((lineText, lineIdx) => {
                    const lineRow = document.createElement('div');
                    lineRow.className = "py-2 border-b border-dashed border-sky-100 last:border-0 flex flex-wrap items-center justify-between gap-3 w-full";

                    // Split this line by the bracket placeholders e.g. （ 0 ）
                    const lineSegments = lineText.split(/（\s*\d+\s*）/);
                    
                    const textSpanContainer = document.createElement('div');
                    textSpanContainer.className = "leading-loose text-slate-800 font-extrabold flex-grow";

                    if (textLines.length > 1) {
                        // Multiline - render inline text directly
                    } else {
                        const numBadge = document.createElement('span');
                        numBadge.className = "bg-sky-500 text-white text-xs font-black rounded-full w-5 h-5 inline-flex items-center justify-center mr-2 align-middle";
                        numBadge.textContent = qIdx + 1;
                        textSpanContainer.appendChild(numBadge);
                    }

                    lineSegments.forEach((segText, index) => {
                        const textNode = document.createElement('span');
                        textNode.textContent = segText;
                        textSpanContainer.appendChild(textNode);

                        const isLast = index === lineSegments.length - 1;
                        if (!isLast) {
                            const currentSelectIdx = totalSelectIdx;
                            const selectEl = document.createElement('select');
                            const savedValue = getOptionState(q.id, currentSelectIdx);
                            const expectedVal = q.answers[currentSelectIdx];
                            
                            if (isAnswerRevealed) {
                                selectEl.disabled = true;
                                selectEl.value = expectedVal;
                                
                                const isUserRight = (savedValue === expectedVal);
                                if (isUserRight) {
                                    selectEl.className = "mx-1.5 my-1 px-3 py-1.5 rounded-xl border-2 font-black text-emerald-600 bg-emerald-50 border-emerald-500 transition-all focus:outline-none";
                                } else {
                                    selectEl.className = "mx-1.5 my-1 px-3 py-1.5 rounded-xl border-2 font-black text-red-600 bg-red-50 border-red-500 transition-all focus:outline-none";
                                }
                            } else {
                                selectEl.className = `mx-1.5 my-1 px-3 py-1.5 rounded-xl border-2 font-black text-sky-600 bg-white transition-all focus:outline-none ${
                                    savedValue ? 'border-sky-500 bg-sky-50' : 'border-sky-300'
                                }`;
                                selectEl.setAttribute('onchange', `selectPairingOption('${q.id}', ${currentSelectIdx}, this.value, this)`);
                            }

                            const defOpt = document.createElement('option');
                            defOpt.value = "";
                            defOpt.textContent = isAnswerRevealed ? expectedVal : "選擇";
                            selectEl.appendChild(defOpt);

                            randomizedPairOptions.forEach(opt => {
                                const oEl = document.createElement('option');
                                oEl.value = opt;
                                oEl.textContent = opt;
                                if (isAnswerRevealed) {
                                    if (opt === expectedVal) oEl.selected = true;
                                } else if (savedValue === opt) {
                                    oEl.selected = true;
                                }
                                selectEl.appendChild(oEl);
                            });

                            textSpanContainer.appendChild(selectEl);
                            totalSelectIdx++;
                        }
                    });

                    lineRow.appendChild(textSpanContainer);

                    // Add individual sentence TTS play button
                    const ttsBtn = document.createElement('button');
                    ttsBtn.className = "text-xs text-sky-600 bg-sky-50 border border-sky-200 px-2 py-1 rounded-full hover:bg-sky-100 font-bold flex items-center gap-1 flex-shrink-0 self-center";
                    const cleanedLineAudio = lineText.replace(/（\s*\d+\s*）/g, " 填空 ");
                    ttsBtn.setAttribute('onclick', `speakSelectedText('${cleanedLineAudio.replace(/'/g, "\\'")}')`);
                    ttsBtn.innerHTML = `<i class="fa-solid fa-volume-high"></i> 🔊 讀句子`;
                    lineRow.appendChild(ttsBtn);

                    card.appendChild(lineRow);
                });

                container.appendChild(card);
            });

            workspace.appendChild(container);
        }

        function selectPairingOption(qId, index, val, selectEl) {
            if (isAnswerRevealed) return;
            playSound('click');
            saveOptionState(qId, val, index);

            if (val !== "") {
                selectEl.className = "mx-1.5 my-1 px-3 py-1.5 rounded-xl border-2 font-black text-sky-600 bg-sky-50 border-sky-500 transition-all focus:outline-none";
                setMascotExpression('thinking');
                setMascotFeedback(`🐰 很好！你把第 ${index + 1} 個空格填了「${val}」！`);
            } else {
                selectEl.className = "mx-1.5 my-1 px-3 py-1.5 rounded-xl border-2 font-black text-sky-600 bg-white border-sky-300 transition-all focus:outline-none";
            }
        }

        // --- STREAMING_CHUNK:Rendering punctuation inline flow... ---
        // --- RENDER TYPE 3: PUNCTUATION DROPBOXES ---
        function renderPunctuationType(ex, workspace) {
            const container = document.createElement('div');
            container.className = "space-y-4";

            ex.questions.forEach((q, qIdx) => {
                const card = document.createElement('div');
                card.className = "p-5 rounded-2xl border-2 border-slate-100 bg-slate-50/50 hover:bg-white transition-all space-y-3";

                let currentRowDiv = document.createElement('div');
                currentRowDiv.className = "py-2 border-b border-dashed border-sky-100 last:border-0 flex flex-wrap items-center justify-between gap-3 w-full leading-loose text-slate-800 font-extrabold";

                q.parts.forEach((p, pIdx) => {
                    if (p.text && p.text.includes('\n')) {
                        card.appendChild(currentRowDiv);
                        
                        currentRowDiv = document.createElement('div');
                        currentRowDiv.className = "py-2 border-b border-dashed border-sky-100 last:border-0 flex flex-wrap items-center justify-between gap-3 w-full leading-loose text-slate-800 font-extrabold";
                        
                        const cleanPText = p.text.replace('\n', '');
                        const textSpan = document.createElement('span');
                        textSpan.textContent = cleanPText;
                        textSpan.className = "align-middle";
                        currentRowDiv.appendChild(textSpan);
                    } else if (p.slotId) {
                        const savedValue = getOptionState(q.id, p.slotId);
                        const selectEl = document.createElement('select');
                        
                        if (isAnswerRevealed) {
                            selectEl.disabled = true;
                            selectEl.value = p.answer;
                            if (savedValue === p.answer) {
                                selectEl.className = "punc-select bg-emerald-50 border-emerald-500 text-emerald-600";
                            } else {
                                selectEl.className = "punc-select bg-red-50 border-red-500 text-red-600";
                            }
                        } else {
                            selectEl.className = `punc-select ${savedValue ? 'bg-sky-50 border-sky-500 text-sky-600' : 'animate-pulse'}`;
                            selectEl.setAttribute('onchange', `selectPuncOption('${q.id}', '${p.slotId}', this.value, this)`);
                        }

                        const randomizedPuncs = shuffleArray(p.options);

                        const defOpt = document.createElement('option');
                        defOpt.value = "";
                        defOpt.textContent = isAnswerRevealed ? p.answer : "？";
                        selectEl.appendChild(defOpt);

                        randomizedPuncs.forEach((opt) => {
                            const oEl = document.createElement('option');
                            oEl.value = opt;
                            oEl.textContent = opt;
                            if (isAnswerRevealed) {
                                if (opt === p.answer) oEl.selected = true;
                            } else if (savedValue === opt) {
                                oEl.selected = true;
                            }
                            selectEl.appendChild(oEl);
                        });

                        currentRowDiv.appendChild(selectEl);
                    } else {
                        const textSpan = document.createElement('span');
                        textSpan.textContent = p.text;
                        textSpan.className = "align-middle";
                        currentRowDiv.appendChild(textSpan);
                    }
                });

                card.appendChild(currentRowDiv);

                // LOCALIZED TTS BUTTONS
                Array.from(card.children).forEach(rowNode => {
                    const lineTextToSpeak = rowNode.textContent.replace(/\s+/g, ' ').replace(/？/g, ' 括號 ').trim();
                    const lineTtsBtn = document.createElement('button');
                    lineTtsBtn.className = "text-xs text-sky-600 bg-sky-50 border border-sky-200 px-2 py-1 rounded-full hover:bg-sky-100 font-bold flex items-center gap-1 flex-shrink-0 self-center ml-auto";
                    lineTtsBtn.setAttribute('onclick', `speakSelectedText('${lineTextToSpeak.replace(/'/g, "\\'")}')`);
                    lineTtsBtn.innerHTML = `<i class="fa-solid fa-volume-high"></i> 🔊 讀句子`;
                    rowNode.appendChild(lineTtsBtn);
                });

                container.appendChild(card);
            });

            workspace.appendChild(container);
        }

        function selectPuncOption(qId, slotId, val, selectEl) {
            if (isAnswerRevealed) return;
            playSound('click');
            saveOptionState(qId, val, slotId);

            if (val !== "") {
                selectEl.className = "punc-select bg-sky-50 border-sky-500 text-sky-600";
                setMascotExpression('thinking');
                setMascotFeedback(`🐰 把這個標點改為了「${val}」！全部填滿就可以提交囉！`);
            } else {
                selectEl.className = "punc-select animate-pulse";
            }
        }

        // --- STREAMING_CHUNK:Rendering reordering words layout... ---
        // --- RENDER TYPE 4: REORDER WORD CARDS ---
        function renderReorderType(ex, workspace) {
            const container = document.createElement('div');
            container.className = "space-y-6";

            ex.questions.forEach((q) => {
                if (!reorderSelections[q.id]) {
                    reorderSelections[q.id] = [];
                }
            });

            ex.questions.forEach((q, qIdx) => {
                const card = document.createElement('div');
                card.className = "p-5 rounded-2xl border-2 border-slate-100 bg-slate-50/50 space-y-4";

                const header = document.createElement('div');
                header.className = "flex items-center justify-between";
                
                const deleteBtnHtml = isAnswerRevealed ? '' : `
                    <button onclick="clearReorderState('${q.id}')" class="text-[11px] font-black text-red-500 hover:text-red-700 bg-red-50 px-2.5 py-1 rounded-full border border-red-200">
                        <i class="fa-solid fa-arrow-rotate-left"></i> 重排
                    </button>
                `;

                header.innerHTML = `
                    <div class="flex items-center space-x-2">
                        <span class="bg-sky-500 text-white text-xs font-black rounded-full w-5 h-5 flex items-center justify-center">${qIdx + 1}</span>
                        <span class="font-black text-[#2D3748]">點選字詞與標點重組句子：</span>
                    </div>
                    ${deleteBtnHtml}
                `;
                card.appendChild(header);

                const targetArea = document.createElement('div');
                targetArea.id = `reorder-target-${q.id}`;
                targetArea.className = "min-h-[4.5rem] p-3 rounded-2xl border-2 border-dashed border-sky-200 bg-sky-50/20 flex flex-wrap items-center gap-2";
                card.appendChild(targetArea);

                const sourceArea = document.createElement('div');
                sourceArea.className = "flex flex-wrap gap-2 pt-2 justify-center";

                const displayPool = shuffleArray(q.words.map((w, idx) => ({ word: w, originalIndex: idx })));

                displayPool.forEach((item) => {
                    const btn = document.createElement('button');
                    btn.id = `reorder-bubble-${q.id}-${item.originalIndex}`;
                    
                    if (isAnswerRevealed) {
                        btn.className = "bg-slate-100 text-slate-400 border-2 border-slate-200 px-4 py-2 rounded-2xl font-black text-sm opacity-50 cursor-not-allowed";
                        btn.disabled = true;
                    } else {
                        btn.className = "bg-white hover:bg-sky-50 text-sky-800 border-2 border-sky-100 px-4 py-2 rounded-2xl font-black text-sm shadow-sm hover:-translate-y-0.5 transition-all btn-bounce";
                        btn.setAttribute('onclick', `clickReorderCard('${q.id}', ${item.originalIndex}, '${item.word.replace(/'/g, "\\'")}')`);
                    }
                    
                    btn.textContent = item.word;
                    sourceArea.appendChild(btn);
                });

                card.appendChild(sourceArea);

                const ttsBtn = document.createElement('button');
                ttsBtn.className = "text-xs text-sky-600 bg-sky-50 border border-sky-200 px-2.5 py-1 rounded-full hover:bg-sky-100 font-bold flex items-center gap-1 flex-shrink-0 self-start";
                const lineOutputToRead = q.correct.join(" ");
                ttsBtn.setAttribute('onclick', `speakSelectedText('${lineOutputToRead.replace(/'/g, "\\'")}')`);
                ttsBtn.innerHTML = `<i class="fa-solid fa-volume-high"></i> 🔊 聽聽正確整句讀音`;
                card.appendChild(ttsBtn);

                if (q.hint && !isAnswerRevealed) {
                    const hintP = document.createElement('p');
                    hintP.className = "text-xs text-sky-500 font-bold flex items-center gap-1 mt-1";
                    hintP.innerHTML = `<i class="fa-solid fa-circle-info"></i> 提示：${q.hint}`;
                    card.appendChild(hintP);
                }

                container.appendChild(card);
                
                setTimeout(() => {
                    if (isAnswerRevealed) {
                        const target = document.getElementById(`reorder-target-${q.id}`);
                        if (target) {
                            target.innerHTML = '';
                            q.correct.forEach((w) => {
                                const bubble = document.createElement('div');
                                bubble.className = "bg-sky-500 text-white font-black px-4 py-2 rounded-2xl shadow-sm flex items-center gap-1.5";
                                bubble.textContent = w;
                                target.appendChild(bubble);
                            });
                        }
                    } else {
                        renderReorderSelections(q.id);
                    }
                }, 10);
            });

            workspace.appendChild(container);
        }

        function clickReorderCard(qId, index, word) {
            if (isAnswerRevealed) return;
            playSound('click');
            const list = reorderSelections[qId] || [];
            
            const alreadySelIdx = list.findIndex(item => item.idx === index);
            if (alreadySelIdx > -1) {
                list.splice(alreadySelIdx, 1);
                const bubble = document.getElementById(`reorder-bubble-${qId}-${index}`);
                if (bubble) {
                    bubble.className = "bg-white hover:bg-sky-50 text-sky-800 border-2 border-sky-100 px-4 py-2 rounded-2xl font-black text-sm shadow-sm hover:-translate-y-0.5 transition-all btn-bounce";
                }
            } else {
                list.push({ idx: index, word: word });
                const bubble = document.getElementById(`reorder-bubble-${qId}-${index}`);
                if (bubble) {
                    bubble.className = "bg-slate-100 text-slate-300 border-2 border-slate-200 px-4 py-2 rounded-2xl font-black text-sm opacity-50 cursor-not-allowed scale-95 transition-all";
                }
            }
            
            reorderSelections[qId] = list;
            renderReorderSelections(qId);
        }

        function renderReorderSelections(qId) {
            const target = document.getElementById(`reorder-target-${qId}`);
            if (!target) return;

            const list = reorderSelections[qId] || [];
            if (list.length === 0) {
                target.innerHTML = `<span class="text-xs text-slate-400 font-bold italic select-none">請點選下方的詞語卡片，句子會自動拼出！✨</span>`;
                return;
            }

            target.innerHTML = '';
            list.forEach((item) => {
                const bubble = document.createElement('div');
                bubble.className = "bg-gradient-to-r from-sky-500 to-blue-500 text-white font-black px-4 py-2 rounded-2xl shadow-sm flex items-center gap-1.5 animate-bounce";
                bubble.style.animationDuration = '0.5s';
                bubble.innerHTML = `
                    <span>${item.word}</span>
                    <button onclick="clickReorderCard('${qId}', ${item.idx}, '${item.word.replace(/'/g, "\\'")}')" class="text-sky-100 hover:text-red-300 transition-colors">
                        <i class="fa-solid fa-circle-xmark"></i>
                    </button>
                `;
                target.appendChild(bubble);
            });
        }

        function clearReorderState(qId) {
            playSound('click');
            const list = reorderSelections[qId] || [];
            list.forEach(item => {
                const bubble = document.getElementById(`reorder-bubble-${qId}-${item.idx}`);
                if (bubble) {
                    bubble.className = "bg-white hover:bg-sky-50 text-sky-800 border-2 border-sky-100 px-4 py-2 rounded-2xl font-black text-sm shadow-sm hover:-translate-y-0.5 transition-all btn-bounce";
                }
            });
            reorderSelections[qId] = [];
            renderReorderSelections(qId);
        }

        // --- STREAMING_CHUNK:Rendering reading comprehension layout with text placed first... ---
        // --- RENDER TYPE 5: READING COMPREHENSIONS ---
        function renderReadingCompType(ex, workspace) {
            const container = document.createElement('div');
            container.className = "space-y-6";

            // ARTICLE CARD FIRST (置頂讀物)
            const pCard = document.createElement('div');
            pCard.className = "p-5 bg-gradient-to-br from-sky-50/50 to-blue-50/30 border-2 border-sky-200 rounded-3xl space-y-3";
            pCard.innerHTML = `
                <div class="flex items-center justify-between flex-wrap gap-2">
                    <span class="bg-sky-600 text-white text-xs font-black px-3 py-1 rounded-full"><i class="fa-solid fa-feather-pointed"></i> 精美小短文</span>
                    <button onclick="speakSelectedText('${ex.passage.replace(/\n/g, ' ').replace(/'/g, "\\'")}')" class="text-xs text-sky-700 bg-white border border-sky-300 px-3 py-1 rounded-full hover:bg-sky-100 font-bold flex items-center gap-1">
                        <i class="fa-solid fa-volume-high"></i> 🔊 朗讀整篇短文
                    </button>
                </div>
                <pre class="whitespace-pre-line text-slate-700 font-black leading-relaxed py-3 text-left" style="font-family: inherit; font-size: 1.15em;">${ex.passage}</pre>
            `;
            container.appendChild(pCard);

            // Questions render
            ex.questions.forEach((q, qIdx) => {
                const card = document.createElement('div');
                card.className = "p-4 rounded-xl border-2 border-slate-100 bg-slate-50/50 hover:bg-white transition-all space-y-3";

                const savedValue = getOptionState(q.id);

                const header = document.createElement('div');
                header.className = "flex items-start justify-between gap-3 flex-wrap";
                header.innerHTML = `
                    <div class="flex items-start space-x-2">
                        <span class="bg-sky-500 text-white text-xs font-black rounded-full w-5 h-5 flex items-center justify-center mt-1 flex-shrink-0">${qIdx + 1}</span>
                        <p class="font-extrabold text-slate-800">${q.qText}</p>
                    </div>
                    <button onclick="speakSelectedText('${q.qText.replace(/'/g, "\\'")}')" class="text-xs text-sky-600 bg-sky-50 border border-sky-200 px-2 py-0.5 rounded-full hover:bg-sky-100 font-bold self-center">
                        <i class="fa-solid fa-volume-high"></i> 🔊 讀問題
                    </button>
                `;
                card.appendChild(header);

                const optGrid = document.createElement('div');
                optGrid.className = "grid grid-cols-1 md:grid-cols-3 gap-2 pt-1";

                const randomizedMCQ = shuffleArray(q.options);

                randomizedMCQ.forEach((opt) => {
                    const btn = document.createElement('button');
                    
                    let activeClasses = "bg-white hover:bg-sky-50 text-slate-700 border-slate-200";
                    if (isAnswerRevealed) {
                        if (opt === q.answer) {
                            activeClasses = "bg-emerald-500 text-white border-emerald-600 shadow-md";
                        } else if (opt === savedValue) {
                            activeClasses = "bg-red-500 text-white border-red-600 shadow-md";
                        } else {
                            activeClasses = "bg-slate-50 text-slate-400 border-slate-100 cursor-not-allowed";
                        }
                        btn.disabled = true;
                    } else if (savedValue === opt) {
                        activeClasses = "bg-sky-500 text-white border-sky-600 shadow-md";
                    }

                    btn.className = `py-3 px-4 rounded-xl border-2 font-black text-left text-sm transition-all ${isAnswerRevealed ? '' : 'btn-bounce'} ${activeClasses}`;
                    btn.textContent = opt;
                    if (!isAnswerRevealed) {
                        btn.setAttribute('onclick', `selectReadingMCQ('${q.id}', '${opt}', this)`);
                    }
                    optGrid.appendChild(btn);
                });

                card.appendChild(optGrid);
                container.appendChild(card);
            });

            workspace.appendChild(container);
        }

        function selectReadingMCQ(qId, val, btnEl) {
            if (isAnswerRevealed) return;
            playSound('click');
            saveOptionState(qId, val);

            const parent = btnEl.parentElement;
            parent.querySelectorAll('button').forEach(b => {
                b.className = "py-3 px-4 rounded-xl border-2 font-black text-left text-sm transition-all btn-bounce bg-white hover:bg-sky-50 text-slate-700 border-slate-200";
            });
            btnEl.className = "py-3 px-4 rounded-xl border-2 font-black text-left text-sm transition-all btn-bounce bg-sky-500 text-white border-sky-600 shadow-md";

            setMascotExpression('thinking');
            setMascotFeedback(`🐰 我也覺得答案是「${val}」，你真學問高深！`);
        }

        function clearCurrentDayAnswers() {
            playSound('click');
            const ex = exercises[currentDay];
            if (!ex) return;

            const savePrefix = `${currentDay}_`;
            Object.keys(userAnswers).forEach(key => {
                if (key.startsWith(savePrefix)) {
                    delete userAnswers[key];
                }
            });

            if (ex.type === "reorder") {
                ex.questions.forEach(q => {
                    reorderSelections[q.id] = [];
                });
            }

            isAnswerRevealed = false; // Reset lock
            loadExercise(currentDay);
            setMascotExpression('neutral');
            setMascotFeedback("🐰 所有的空格和重組都清除好了，重新寫一次試試看吧！");
        }

        // --- STREAMING_CHUNK:Validating submitted answers and handling Direct Reveal... ---
        // --- SUBMIT AND VALIDATE ANSWER SCHEMES ---
        function validateAnswers() {
            const ex = exercises[currentDay];
            if (!ex) return;

            let isDayCorrect = true;
            let questionsCount = ex.questions ? ex.questions.length : 1;
            let correctCount = 0;

            if (ex.type === "cloze") {
                ex.questions.forEach(q => {
                    const ans = getOptionState(q.id);
                    if (!ans) isDayCorrect = false;
                    else if (ans === q.answer) correctCount++;
                    else isDayCorrect = false;
                });
            } else if (ex.type === "pairing") {
                ex.questions.forEach(q => {
                    const ansMap = userAnswers[`${currentDay}_${q.id}`] || {};
                    
                    if (q.optionalExchange) {
                        const expected = [...q.answers];
                        const userArr = q.answers.map((_, i) => ansMap[i] || "");
                        let localValid = true;
                        
                        // Check if all slots are filled
                        if (userArr.includes("")) {
                            isDayCorrect = false;
                            localValid = false;
                        }

                        userArr.forEach((ans, idx) => {
                            if (q.optionalExchange.includes(idx)) {
                                const alternatives = q.optionalExchange.map(i => expected[i]);
                                if (!alternatives.includes(ans)) localValid = false;
                            } else {
                                if (ans !== expected[idx]) localValid = false;
                            }
                        });

                        const uniqueCheck = new Set(q.optionalExchange.map(i => userArr[i]));
                        if (uniqueCheck.size !== q.optionalExchange.length) localValid = false;

                        if (localValid) correctCount++;
                        else isDayCorrect = false;

                    } else {
                        let allMatch = true;
                        q.answers.forEach((ans, idx) => {
                            if (ansMap[idx] !== ans) {
                                allMatch = false;
                                isDayCorrect = false;
                            }
                        });
                        if (allMatch) correctCount++;
                    }
                });
            } else if (ex.type === "punctuation") {
                ex.questions.forEach(q => {
                    const ansMap = userAnswers[`${currentDay}_${q.id}`] || {};
                    const slots = q.parts.filter(p => p.slotId);
                    let allSlotsCorrect = true;

                    slots.forEach(s => {
                        if (ansMap[s.slotId] !== s.answer) {
                            allSlotsCorrect = false;
                            isDayCorrect = false;
                        }
                    });

                    if (allSlotsCorrect) correctCount++;
                });
            } else if (ex.type === "reorder") {
                ex.questions.forEach(q => {
                    const sequence = (reorderSelections[q.id] || []).map(item => item.word).join("");
                    const expectedStr = q.correct.join("");

                    if (sequence === expectedStr) {
                        correctCount++;
                    } else {
                        isDayCorrect = false;
                    }
                });
            } else if (ex.type === "reading_comp") {
                ex.questions.forEach(q => {
                    const ans = getOptionState(q.id);
                    if (!ans) isDayCorrect = false;
                    else if (ans === q.answer) correctCount++;
                    else isDayCorrect = false;
                });
            }

            // REVEAL LOGIC UPDATE
            isAnswerRevealed = true; // Lock interactive states immediately on checking
            loadExercise(currentDay); // Reload workspace to apply locking/coloring classes

            if (isDayCorrect || correctCount === questionsCount) {
                // CORRECT
                playSound('correct');
                setMascotExpression('happy');
                progress[currentDay] = true;
                saveProgress();
                buildCalendar();

                const lang = document.getElementById('tts-lang').value;
                const praise = "答對了，做得好！";
                speakText(praise, lang);

                // Show modal overlay
                triggerConfetti();
                showModal("答對了，做得好！🌟", `你順利完成了第 ${currentDay} 天的中文精讀大挑戰！獲得了一顆金星！樂樂兔為你驕傲！`);

                document.getElementById('check-btn').classList.add('hidden');
                document.getElementById('next-btn').classList.remove('hidden');
                document.getElementById('status-message').classList.remove('hidden');
            } else {
                // WRONG - No try again dialog, immediately reveal correct states
                playSound('wrong');
                setMascotExpression('sad');

                const lang = document.getElementById('tts-lang').value;
                const encourage = lang === 'zh-HK' ? "唔緊要，看一看正確答案，再接再厲！" : "沒關係，看一看正確答案，再接再厲！";
                speakText(encourage, lang);

                setMascotFeedback(`🐰 呀，答對了 ${correctCount} 題。沒關係，樂樂兔已經為你標示了正確答案，一起學習吧！`);

                document.getElementById('check-btn').classList.add('hidden');
                document.getElementById('next-btn').classList.remove('hidden');
                document.getElementById('status-message').classList.add('hidden');
            }
        }

        function goToNextDay() {
            if (currentDay < 14) {
                currentDay++;
                selectDay(currentDay);
            } else {
                playSound('correct');
                setMascotExpression('happy');
                isFinalCelebration = true;
                showModal("🏆 終極挑戰大通關！", "恭喜你！你已完成所有關卡，成為中文小達人！🎉✨");
                setMascotFeedback("🐰 恭喜你！你已完成所有關卡，成為中文小達人！🏆");
            }
        }

        // --- STREAMING_CHUNK:Implementing Text to Speech controls... ---
        // --- TTS SPEAKER MECHANISM WITH ROBUST IPHONE MANDARIN VOICE DETECT ---
        function speakCurrentQuestion() {
            const ex = exercises[currentDay];
            if (!ex) return;
            const lang = document.getElementById('tts-lang').value;
            speakText(ex.audioText, lang);
        }

        function speakMascotFeedback() {
            const feedback = document.getElementById('lele-feedback').textContent;
            const lang = document.getElementById('tts-lang').value;
            speakText(feedback, lang);
        }

        function speakText(text, lang) {
            if (!('speechSynthesis' in window)) {
                console.warn('Speech synthesis not supported on this browser.');
                return;
            }

            window.speechSynthesis.cancel(); // Terminate existing voices

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;

            const voices = window.speechSynthesis.getVoices();
            
            // Advanced voice matching designed to prevent iPhone/iOS falling back to local accent (Cantonese)
            let bestVoice = null;
            if (lang === 'zh-CN') {
                bestVoice = voices.find(v => {
                    const name = v.name.toLowerCase();
                    const vLang = v.lang.toLowerCase();
                    return (vLang.includes('zh-cn') || vLang.includes('zh-chs') || vLang.includes('zh-hans') || name.includes('tingting') || name.includes('mandarin') || name.includes('putonghua') || name.includes('yating'));
                });
            } else if (lang === 'zh-HK') {
                bestVoice = voices.find(v => {
                    const name = v.name.toLowerCase();
                    const vLang = v.lang.toLowerCase();
                    return (vLang.includes('zh-hk') || vLang.includes('zh-cht') || vLang.includes('zh-hant') || name.includes('cantonese') || name.includes('sinji') || name.includes('sin-ji') || name.includes('hong kong'));
                });
            }

            if (!bestVoice) {
                bestVoice = voices.find(v => v.lang.toLowerCase().replace('_', '-').startsWith(lang.toLowerCase()));
            }

            if (bestVoice) {
                utterance.voice = bestVoice;
            }

            // Kid-friendly tone
            utterance.pitch = 1.25;
            utterance.rate = 0.95;

            window.speechSynthesis.speak(utterance);
        }

        // --- DYNAMIC SVG LELE RABBIT FIVE-SENSES RENDER ---
        function setMascotExpression(state) {
            const eyesGroup = document.getElementById('dynamic-eyes');
            const mouthGroup = document.getElementById('dynamic-mouth');

            if (state === 'happy') {
                eyesGroup.innerHTML = `
                    <path d="M 40 86 Q 48 76 56 86" fill="none" stroke="#2D3748" stroke-width="5" stroke-linecap="round" />
                    <path d="M 64 86 Q 72 76 80 86" fill="none" stroke="#2D3748" stroke-width="5" stroke-linecap="round" />
                `;
                mouthGroup.innerHTML = `
                    <path d="M 50 92 Q 60 106 70 92 Z" fill="#FF8A8A" stroke="#2D3748" stroke-width="3" />
                `;
            } else if (state === 'sad') {
                eyesGroup.innerHTML = `
                    <path d="M 40 80 L 52 88" stroke="#2D3748" stroke-width="5" stroke-linecap="round" />
                    <path d="M 80 80 L 68 88" stroke="#2D3748" stroke-width="5" stroke-linecap="round" />
                    <!-- Tear Drop -->
                    <path d="M 43 90 Q 41 98 45 98 Q 49 98 47 90 Z" fill="#63B3ED" />
                    <path d="M 77 90 Q 75 98 79 98 Q 83 98 81 90 Z" fill="#63B3ED" />
                `;
                mouthGroup.innerHTML = `
                    <path d="M 54 98 Q 60 92 66 98" fill="none" stroke="#2D3748" stroke-width="3.5" stroke-linecap="round" />
                `;
            } else if (state === 'thinking') {
                eyesGroup.innerHTML = `
                    <!-- Blinking one eye winking -->
                    <circle cx="48" cy="84" r="5" fill="#2D3748" />
                    <circle cx="72" cy="84" r="5" fill="#2D3748" />
                    <circle cx="46" cy="82" r="1.8" fill="white" />
                    <circle cx="70" cy="82" r="1.8" fill="white" />
                `;
                mouthGroup.innerHTML = `
                    <circle cx="60" cy="94" r="4.5" fill="none" stroke="#2D3748" stroke-width="3" />
                `;
            } else {
                // Neutral default cute look
                eyesGroup.innerHTML = `
                    <circle cx="48" cy="84" r="5" fill="#2D3748" />
                    <circle cx="72" cy="84" r="5" fill="#2D3748" />
                    <circle cx="46" cy="82" r="1.8" fill="white" />
                    <circle cx="70" cy="82" r="1.8" fill="white" />
                `;
                mouthGroup.innerHTML = `
                    <path d="M 57 88 L 63 88" stroke="#2D3748" stroke-width="2.5" stroke-linecap="round" />
                    <path d="M 55 92 Q 60 97 65 92" fill="none" stroke="#2D3748" stroke-width="2.5" stroke-linecap="round" />
                `;
            }
        }

        // --- REWARD CELEBRATION POPUP OVERLAYS ---
        function showModal(title, body) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-body').textContent = body;
            document.getElementById('reward-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('reward-modal').classList.add('hidden');
            if (isFinalCelebration) {
                setMascotFeedback("🐰 恭喜你！你已完成所有關卡，成為中文小達人！🏆");
                return;
            }
            goToNextDay();
        }

        function triggerConfetti() {
            const container = document.getElementById('modal-confetti');
            container.innerHTML = '';

            for (let i = 0; i < 35; i++) {
                const particle = document.createElement('div');
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const size = Math.random() * 8 + 6;
                const palette = ['#38BDF8', '#FBBF24', '#0EA5E9', '#0284C7', '#C084FC'];
                const color = palette[Math.floor(Math.random() * palette.length)];

                particle.style.position = 'absolute';
                particle.style.left = `${x}%`;
                particle.style.top = `${y}%`;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.backgroundColor = color;
                particle.style.borderRadius = '50%';
                particle.style.transform = `rotate(${Math.random() * 360}deg)`;
                particle.className = "animate-ping";
                particle.style.animationDuration = `${Math.random() * 1.5 + 0.8}s`;

                container.appendChild(particle);
            }
        }
    </script>
